spring:
  datasource:
    username: web_user
    password: test
  liquibase:
    liquibase-schema: dina_base
    user: migration_user
    password: test
    change-log: classpath:/db/changelog/db.changelog-master.xml
    contexts: schema-change, initial-data
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://keycloak.example.com/auth/realms/my-realm
          jwk-set-uri: https://keycloak.example.com/auth/realms/my-realm/protocol/openid-connect/certs
keycloak.enabled: false
embedded.postgresql:
  enabled: true
  # Need to specify the version the same as in Production
  image: postgis/postgis:12-2.5-alpine
  init-script-file: create-test-data.sql
  database: dina_test
  schema: dina_base
  max_connection : 500
javers:
  # Don't let Javers create its tables
  sqlSchemaManagementEnabled: false

dev-user:
  groupRole :
    aafc :
      - user
    bicoe :
      - read-only
